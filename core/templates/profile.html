{% extends 'base.html' %}

{% block title %}Профиль — MathMaster{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="text-center mb-4">Мой профиль</h3>
            <p><strong>Имя пользователя:</strong> {{ profile.user.username }}</p>
            <p><strong>Присоединился:</strong> {{ profile.joined_at|date:"d.m.Y" }}</p>

            <hr>
            <a href="{% url 'password_change' %}" class="btn btn-outline-primary">Сменить пароль</a>
            <a href="{% url 'logout' %}" class="btn btn-outline-danger">Выйти</a>
        </div>
    </div>
</div>
{% endblock %}
