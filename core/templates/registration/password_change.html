{% extends 'base.html' %}

{% block title %}Смена пароля — MathMaster{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="text-center mb-4">Смена пароля</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Сменить пароль</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
