{% extends 'base.html' %}

{% block title %}Вход — MathMaster{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="text-center mb-4">Вход в аккаунт</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <p class="text-center mt-3">
                Нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
