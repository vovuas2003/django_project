{% extends 'base.html' %}

{% block title %}Главная — MathMaster{% endblock %}

{% block content %}
<div class="text-center">
    <h1>🧠 Добро пожаловать в MathMaster!</h1>
    <p class="lead">Развивайте устный счёт с ежедневными тренировками.</p>
    {% if user.is_authenticated %}
        <a href="{% url 'profile' %}" class="btn btn-primary btn-lg">Мой профиль</a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Войти</a>
        <a href="{% url 'register' %}" class="btn btn-outline-primary btn-lg">Зарегистрироваться</a>
    {% endif %}
</div>
{% endblock %}
